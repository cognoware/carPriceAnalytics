# Aplicacion
spring.application.name=carPriceAnalytics
server.servlet.context-path=/api/car-price

# H2 Database (demo)
spring.datasource.url=jdbc:h2:mem:carpricedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Keycloak / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/master}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_URI:http://localhost:8080/realms/master/protocol/openid-connect/certs}

# Async Thread Pool
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=50

# Extraccion - Timeouts (ms)
extraction.timeout.default=25000
extraction.timeout.price=20000
extraction.connect-timeout=3000
extraction.read-timeout=30000

# Limite dias para refrescar cache
extraction.cache.limit-days=7

# SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
